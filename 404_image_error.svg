<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
  <defs>
    <!-- 星空渐变 -->
    <radialGradient id="starBg" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </radialGradient>

    <!-- 星星发光滤镜 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 星空背景 -->
  <rect x="0" y="0" width="320" height="180" fill="url(#starBg)"/>

  <!-- 星星 -->
  <circle cx="30" cy="25" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="60" cy="45" r="1" fill="white" opacity="0.6"/>
  <circle cx="85" cy="18" r="1.2" fill="white" opacity="0.9"/>
  <circle cx="120" cy="35" r="1" fill="white" opacity="0.5"/>
  <circle cx="150" cy="15" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="180" cy="50" r="1" fill="white" opacity="0.6"/>
  <circle cx="210" cy="22" r="1.3" fill="white" opacity="0.8"/>
  <circle cx="240" cy="40" r="1" fill="white" opacity="0.5"/>
  <circle cx="270" cy="20" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="295" cy="55" r="1" fill="white" opacity="0.6"/>
  <circle cx="40" cy="70" r="1" fill="white" opacity="0.4"/>
  <circle cx="100" cy="65" r="1.2" fill="white" opacity="0.7"/>
  <circle cx="160" cy="75" r="1" fill="white" opacity="0.5"/>
  <circle cx="220" cy="68" r="1.3" fill="white" opacity="0.6"/>
  <circle cx="280" cy="72" r="1" fill="white" opacity="0.4"/>
  <circle cx="50" cy="100" r="1" fill="white" opacity="0.5"/>
  <circle cx="130" cy="95" r="1.2" fill="white" opacity="0.8"/>
  <circle cx="200" cy="105" r="1" fill="white" opacity="0.6"/>
  <circle cx="260" cy="98" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="300" cy="110" r="1" fill="white" opacity="0.5"/>
  <circle cx="20" cy="130" r="1.2" fill="white" opacity="0.6"/>
  <circle cx="80" cy="140" r="1" fill="white" opacity="0.4"/>
  <circle cx="170" cy="135" r="1.3" fill="white" opacity="0.8"/>
  <circle cx="250" cy="145" r="1" fill="white" opacity="0.5"/>
  <circle cx="310" cy="130" r="1.5" fill="white" opacity="0.7"/>

  <!-- 亮星（带光晕） -->
  <circle cx="160" cy="30" r="2" fill="white" filter="url(#glow)" opacity="0.9"/>
  <circle cx="90" cy="55" r="1.8" fill="white" filter="url(#glow)" opacity="0.8"/>
  <circle cx="230" cy="45" r="2" fill="white" filter="url(#glow)" opacity="0.9"/>

  <!-- 图片占位符 -->
  <rect x="110" y="55" width="100" height="65" rx="8" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- 图片内的小山/风景线条 -->
  <path d="M120 110 L135 95 L148 105 L160 88 L175 100 L190 85 L200 95" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 小太阳/月亮 -->
  <circle cx="130" cy="75" r="5" fill="rgba(255,255,255,0.2)"/>

  <!-- 断裂斜线 -->
  <line x1="120" y1="55" x2="200" y2="120" stroke="#ff6b6b" stroke-width="3" stroke-linecap="round" opacity="0.9"/>

  <!-- 感叹号 -->
  <g transform="translate(185, 95)">
    <circle cx="0" cy="0" r="12" fill="#ff6b6b" opacity="0.95"/>
    <rect x="-1.5" y="-5" width="3" height="7" rx="1" fill="white"/>
    <circle cx="0" cy="3.5" r="1.2" fill="white"/>
  </g>

  <!-- 底部文字 -->
  <text x="160" y="155" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="500" fill="rgba(255,255,255,0.7)">图片已失效</text>

  <!-- 底部装饰线 -->
  <line x1="130" y1="165" x2="190" y2="165" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-linecap="round"/>
</svg>